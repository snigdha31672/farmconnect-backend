spring.application.name=farmconnect-backend
server.port=8081

# ── MySQL Database Configuration ──
spring.datasource.url=jdbc:mysql://localhost:3306/farmconnectdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=#Reshnavi16
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Logging ──
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ── JWT ──
jwt.secret=farmconnect-super-secret-key-2024-must-be-at-least-256-bits-long
jwt.expiration=86400000